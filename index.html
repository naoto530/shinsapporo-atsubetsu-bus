<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#006b5f">
    <meta name="color-scheme" content="light">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="六花亭バス">
    <meta name="application-name" content="六花亭バス">
    <meta name="description" content="新札幌駅バスターミナルから六花亭周辺へ向かうバス検索PWA">
    <title>六花亭周辺 バス検索</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="apple-touch-startup-image" href="assets/splash-1170x2532.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">新札幌駅バスターミナル発</p>
          <h1>六花亭周辺行き</h1>
        </div>
        <div class="signal" id="connectionSignal" aria-live="polite">
          <span class="signal-dot"></span>
          <span id="connectionText">確認中</span>
        </div>
      </header>

      <section class="baby-card" aria-label="なーたんからのメッセージ">
        <img class="baby-photo" src="assets/baby.png" alt="気をつけて帰ってきてねと待っている赤ちゃん">
        <div class="baby-bubble">
          <p class="baby-kicker">なーたんからひとこと</p>
          <p id="babyLine">帰り道、気をつけてきてね！</p>
        </div>
      </section>

      <main>
        <section class="panel search-panel" aria-labelledby="searchTitle">
          <div class="panel-heading">
            <div>
              <p class="eyebrow">検索条件</p>
              <h2 id="searchTitle">出発時刻を選ぶ</h2>
            </div>
            <button class="icon-button" id="useNowButton" type="button" aria-label="現在日時に戻す">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 6v6l4 2"></path>
                <path d="M21 12a9 9 0 1 1-3.2-6.9"></path>
                <path d="M21 4v6h-6"></path>
              </svg>
            </button>
          </div>

          <div class="now-strip">
            <div>
              <span class="label">現在</span>
              <strong id="currentClock">--:--</strong>
            </div>
            <div>
              <span class="label">判定</span>
              <strong id="currentDayType">--</strong>
            </div>
          </div>

          <form class="datetime-form" id="searchForm">
            <label>
              <span>日付</span>
              <input id="dateInput" type="date" required>
            </label>
            <label>
              <span>時刻</span>
              <input id="timeInput" type="time" required>
            </label>
          </form>

          <div class="button-row">
            <button class="primary-button" id="searchButton" type="button">この条件で検索</button>
            <button class="secondary-button" id="refreshDataButton" type="button">時刻表を更新</button>
          </div>
        </section>

        <nav class="tabs" aria-label="表示切り替え">
          <button class="tab is-active" type="button" data-view="next">次のバス</button>
          <button class="tab" type="button" data-view="schedule">時刻表一覧</button>
        </nav>

        <section id="nextView" class="view-section" aria-labelledby="nextTitle">
          <div class="section-title">
            <div>
              <p class="eyebrow" id="searchContext">--</p>
              <h2 id="nextTitle">現在時刻以降の便</h2>
            </div>
            <span class="data-chip" id="dataVersion">読込中</span>
          </div>
          <div id="notice" class="notice" hidden></div>
          <div id="resultList" class="bus-list" aria-live="polite"></div>
        </section>

        <section id="scheduleView" class="view-section" aria-labelledby="scheduleTitle" hidden>
          <div class="section-title">
            <div>
              <p class="eyebrow">全対象路線</p>
              <h2 id="scheduleTitle">時刻表一覧</h2>
            </div>
          </div>
          <div class="segmented" role="tablist" aria-label="曜日種別">
            <button class="segment is-active" type="button" data-day-type="weekday">平日</button>
            <button class="segment" type="button" data-day-type="saturday">土曜</button>
            <button class="segment" type="button" data-day-type="holiday">日曜・祝日</button>
          </div>
          <div id="scheduleList" class="schedule-list"></div>
        </section>
      </main>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
    <script src="app.js" defer></script>
  </body>
</html>
